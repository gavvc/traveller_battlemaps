<!DOCTYPE html>
<html>
<head>
<style>
  .grid-test {
    width: 500px;
    height: 500px;
    background-color: white;
    background-image: 
      linear-gradient(rgba(0,0,0,0.09) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.09) 1px, transparent 1px),
      linear-gradient(rgba(0,0,0,0.18) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.18) 1px, transparent 1px);
    background-size: 60px 60px, 60px 60px, 600px 600px, 600px 600px;
    background-position: 0px 0px, 0px 0px, 0px 0px, 0px 0px;
  }
</style>
</head>
<body>
  <div class="grid-test"></div>
</body>
</html>
